<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Indoor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        
        /* Estilo da Tela de Login */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        img { width: 180px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #28a745; color: white; border: none; }
        .btn-save:hover { background-color: #218838; }
        .btn-pdf { background-color: #e67e22; color: white; border: none; margin-top: 10px; }
        .btn-pdf:hover { background-color: #f39c12; }
        .btn-clear { background-color: #dc3545; color: white; border: none; font-size: 16px; margin-top: 10px; }
        .btn-nav { background-color: #007bff; color: white; border: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" alt="Logo">
            <h3>Acesso Restrito</h3>
            <input type="password" id="senhaAcesso" placeholder="Digite a senha de acesso">
            <button class="btn-nav" onclick="verificarAcesso()">ENTRAR</button>
        </div>
    </div>

    <div id="conteudo-sistema">
        <div class="card">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" alt="Logo">
            
            <input type="text" id="etapa" placeholder="Nome da Etapa (ex: GP Brasil)" oninput="atualizarEtapaFirebase()">
            
            <select id="categoria">
                <option value="PRODUCTION">PRODUCTION</option>
                <option value="SUPER PRODUCTION">SUPER PRODUCTION</option>
                <option value="PROTOTIPO">PROTOTIPO</option>
                <option value="UTV">UTV</option>
                <option value="INICIANTE">INICIANTE</option>
            </select>

            <input type="text" id="piloto" placeholder="Nome do Piloto" style="text-transform: uppercase;">
            
            <input type="text" id="tempo" placeholder="00:00:000" maxlength="9">

            <button class="btn-save" onclick="enviarDados()">SALVA VOLTA</button>
            <button class="btn-pdf" onclick="exportarPDF()">RELATÓRIO DE PROVA</button>
            
            <hr>
            <button class="btn-nav" onclick="window.location.href='alteracao.html'">ALTERAR DADOS</button>
            <button class="btn-nav" onclick="window.location.href='resultados.html'" style="background-color: #6c757d;">VER RESULTADOS</button>
            
            <button class="btn-clear" onclick="limparBanco()">LIMPAR TODOS OS DADOS</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4ajZM_W0_qGOlrlRoPn6DUsUBUm4qAcc",
            authDomain: "crono-rrb.firebaseapp.com",
            databaseURL: "https://crono-rrb-default-rtdb.firebaseio.com",
            projectId: "crono-rrb",
            storageBucket: "crono-rrb.firebasestorage.app",
            messagingSenderId: "1472207720",
            appId: "1:1472207720:web:11502aed4117b1fda714dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- LÓGICA DE ACESSO ---
        function verificarAcesso() {
            const senhaDigitada = document.getElementById('senhaAcesso').value;
            if (senhaDigitada === "75999862628") {
                document.getElementById('login-overlay').style.display = 'none';
                sessionStorage.setItem('logado', 'true');
            } else {
                alert("Senha incorreta!");
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('logado') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
            }
        };

        document.getElementById('senhaAcesso').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verificarAcesso();
        });
        // -------------------------

        db.ref('configuracao/etapaAtual').on('value', (snapshot) => {
            if(snapshot.exists()) {
                document.getElementById('etapa').value = snapshot.val();
            }
        });

        function atualizarEtapaFirebase() {
            const nome = document.getElementById('etapa').value;
            db.ref('configuracao').update({ etapaAtual: nome });
        }

        document.getElementById('tempo').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) {
                v = v.replace(/(\d{2})(\d{2})(\d{3})/, "$1:$2:$3");
            } else if (v.length > 2) {
                v = v.replace(/(\d{2})(\d{2})/, "$1:$2");
            }
            e.target.value = v;
        });

        // Opção 1: Lógica automática para suportar múltiplas entradas por piloto
        async function enviarDados() {
            const etapa = document.getElementById('etapa').value;
            const categoria = document.getElementById('categoria').value;
            const piloto = document.getElementById('piloto').value.trim().toUpperCase();
            const tempo = document.getElementById('tempo').value;

            if (!etapa || !piloto || tempo.length < 9) {
                alert("Por favor, preencha todos os campos. O tempo deve ter o formato 00:00:000");
                return;
            }

            const snapshot = await db.ref('pilotos').once('value');
            const data = snapshot.val();
            
            let idPendente = null;

            if (data) {
                for (let id in data) {
                    if (data[id].categoria === categoria && data[id].piloto === piloto && data[id].volta2 === "00:00:000") {
                        idPendente = id;
                        break;
                    }
                }
            }

            if (!idPendente) {
                const novaRef = db.ref('pilotos').push(); 
                await novaRef.set({
                    categoria: categoria,
                    piloto: piloto,
                    volta1: tempo,
                    volta2: "00:00:000"
                });
                alert(`Nova entrada criada para ${piloto}! Volta 1 salva!`);
            } else {
                await db.ref('pilotos/' + idPendente).update({ volta2: tempo });
                alert(`Volta 2 salva na entrada atual de ${piloto}!`);
            }
            document.getElementById('tempo').value = "";
        }

        function limparBanco() {
            const senha = prompt("CUIDADO: Isso apagará PILOTOS e CONFIGURAÇÕES.\nDigite a senha para confirmar:");
            if (senha === "75999862628") {
                db.ref('/').remove()
                    .then(() => {
                        alert("Todos os dados do banco foram resetados!");
                        window.location.reload();
                    })
                    .catch((e) => alert("Erro ao apagar: " + e));
            } else if (senha !== null) {
                alert("Senha incorreta!");
            }
        }

        function tParaMs(t) {
            if (!t || t === "00:00:000") return 0;
            const p = t.split(':');
            return (parseInt(p[0]) * 60000) + (parseInt(p[1]) * 1000) + parseInt(p[2]);
        }
        function msParaT(ms) {
            if (ms === 0) return "00:00:000";
            const min = Math.floor(ms / 60000);
            const seg = Math.floor((ms % 60000) / 1000);
            const mil = ms % 1000;
            return `${String(min).padStart(2,'0')}:${String(seg).padStart(2,'0')}:${String(mil).padStart(3,'0')}`;
        }

        // LÓGICA DO PDF: Filtra apenas a entrada mais rápida de cada piloto e monta a classificação geral
        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const snapshot = await db.ref('pilotos').once('value');
            const data = snapshot.val();
            const etapaSnap = await db.ref('configuracao/etapaAtual').once('value');
            const nomeEtapa = etapaSnap.val() || "Geral";

            if (!data) { alert("Não há dados para exportar."); return; }

            // Primeiro passo: Processar todas as entradas vindas do banco
            let todasEntradas = [];
            
            // Vamos agrupar para saber qual número da entrada cada registro representa cronologicamente
            let contadorPorPilotoCat = {};

            for (let k in data) {
                const p = data[k];
                const chaveAgrupamento = `${p.categoria}_${p.piloto}`;
                
                if (!contadorPorPilotoCat[chaveAgrupamento]) {
                    contadorPorPilotoCat[chaveAgrupamento] = 1;
                } else {
                    contadorPorPilotoCat[chaveAgrupamento]++;
                }

                const soma = tParaMs(p.volta1) + tParaMs(p.volta2);
                todasEntradas.push({ 
                    ...p, 
                    totalMs: soma, 
                    totalStr: msParaT(soma),
                    numeroEntrada: contadorPorPilotoCat[chaveAgrupamento]
                });
            }

            const logoUrl = "https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png";
            const img = new Image();
            img.src = logoUrl;
            img.crossOrigin = "Anonymous";

            img.onload = function() {
                doc.addImage(img, 'PNG', 10, 10, 30, 30);
                doc.setFontSize(18);
                doc.text(`CLASSIFICAÇÃO GERAL DA PROVA`, 45, 22);
                doc.setFontSize(12);
                doc.text(`${nomeEtapa}`, 45, 30);
                doc.setFontSize(10);
                doc.text(`${new Date().toLocaleString()}`, 45, 36);
                
                let y = 50;
                const cats = ["PRODUCTION", "SUPER PRODUCTION", "PROTOTIPO", "UTV", "INICIANTE"];

                cats.forEach(cat => {
                    let filtradosCategoria = todasEntradas.filter(p => p.categoria === cat);
                    
                    if (filtradosCategoria.length > 0) {
                        
                        // NOVIDADE: Filtra para manter somente o melhor tempo total de cada piloto único
                        let melhoresTemposPilotos = {};
                        
                        filtradosCategoria.forEach(registro => {
                            // Só considera se ambas as voltas foram completadas (evita registrar soma incompleta como melhor tempo)
                            if(registro.volta1 !== "00:00:000" && registro.volta2 !== "00:00:000") {
                                const nome = registro.piloto;
                                if (!melhoresTemposPilotos[nome] || registro.totalMs < melhoresTemposPilotos[nome].totalMs) {
                                    melhoresTemposPilotos[nome] = registro;
                                }
                            }
                        });

                        // Transforma o objeto de melhores tempos de volta em uma lista ordenada por tempo crescente
                        let rankingFinal = Object.values(melhoresTemposPilotos);
                        rankingFinal.sort((a, b) => a.totalMs - b.totalMs);

                        if(rankingFinal.length > 0) {
                            doc.setFontSize(14);
                            doc.setTextColor(40);
                            doc.text(`Categoria: ${cat}`, 10, y);
                            
                            // Constrói as linhas do PDF exibindo a Posição Oficial, Nome, as Voltas obtidas e qual Entrada gerou aquele recorde
                            const rows = rankingFinal.map((p, i) => [
                                `${i + 1}º`, 
                                p.piloto, 
                                `${p.numeroEntrada}`, 
                                p.volta1, 
                                p.volta2, 
                                p.totalStr
                            ]);
                            
                            doc.autoTable({
                                startY: y + 5,
                                head: [['Pos', 'Piloto', 'Entrada de pista', 'Volta 1', 'Volta 2', 'Tempo Total']],
                                body: rows,
                                theme: 'grid',
                                headStyles: { fillColor: [40, 167, 69] }, // Cor verde para destacar que é a classificação final
                                styles: { fontSize: 10 }
                            });
                            y = doc.lastAutoTable.finalY + 15;
                        }
                    }
                });
                doc.save(`Classificacao_Final_${nomeEtapa}.pdf`);
            };
        }
    </script>
</body>
</html>
